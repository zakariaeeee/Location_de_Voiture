<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
       layout:decorate="layoutadmin.html">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div layout:fragment="content">
    <div class="bg-light rounded h-100 p-4 justify-content-around">
        <h6 class="mb-4 text-center">Detail de voiture</h6>
        <div>
            <div class="d-flex justify-content-around">
                <div class="mb-3 text-center w-50">
                    <h5  class="form-label">Image</h5>
                    <img th:src="${imagePath}" alt="Uploaded image" class="w-75 h-100">


                </div>
                <div>
                    <div class="mb-3">
                        <h5  class="form-label">Nom</h5>
                        <label class="form-label" th:text="${voiture.nom}"></label>
                    </div>
                    <div class="mb-3">
                        <h5  class="form-label">Marque</h5>
                        <label class="form-label" th:text="${voiture.marque}"></label>
                    </div>
                    <div class="mb-3">
                        <h5  class="form-label">Capacite</h5>
                        <label class="form-label" th:text="${voiture.capacite}"></label>
                    </div>
                    <div class="mb-3">
                        <h5  class="form-label">Model</h5>
                        <label class="form-label" th:text="${voiture.model}"></label>
                    </div>

                </div>
                <div>
                    <div class="mb-3">
                        <h5  class="form-label">Type de Gasol</h5>
                        <label class="form-label" th:text="${voiture.type_de_gasol}"></label>
                    </div>
                    <div class="mb-3">
                        <h5  class="form-label">Type de Transmition</h5>
                        <label class="form-label" th:text="${voiture.type_de_transmition}"></label>
                    </div>
                    <div class="mb-3">
                        <h5 class="form-label">Prix</h5>
                        <label class="form-label" th:text="${voiture.prix}"></label>
                    </div>
                </div>
            </div>

            </form>
        </div>
    </div>
</body>
</html>
