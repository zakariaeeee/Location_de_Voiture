<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
       layout:decorate="layout.html">
<head>
    <meta charset="UTF-8">
    <title>Ajouter Client</title>
</head>
<body>
<div layout:fragment="content">
    <div class="bg-light rounded h-100 p-4 justify-content-around">
        <h6 class="mb-4 text-center">Modifer votre compte Client</h6>
        <form action="" method="post" th:object="${client}">

            <div class="d-flex justify-content-around">
                <div>
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom</label>
                        <input type="text" class="form-control" id="nom"  th:field="*{nom}"/>
                    </div>
                    <div class="mb-3">
                        <label for="prenom" class="form-label">Prenom</label>
                        <input type="text" class="form-control" id="prenom"  th:field="*{prenom}">
                    </div>
                    <div class="mb-3">
                        <label for="tele" class="form-label">Téléphone</label>
                        <input type="text" class="form-control" id="tele"  th:field="*{telephone}"/>
                    </div>
                    <div class="mb-3">
                        <label for="cin" class="form-label">CIN</label>
                        <input type="text" class="form-control" id="cin"  th:field="*{cin}"/>
                    </div>


                </div>
                <div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date de naissance</label>
                        <input type="date" class="form-control" id="date"  th:field="*{date_de_naissance}"/>
                    </div>
                    <div class="mb-3">
                        <label for="exampleInputEmail1" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="exampleInputEmail1"  th:field="*{email}"/>
                    </div>
                    <div class="mb-3">
                        <label for="adresse" class="form-label">Adresse</label>
                        <input type="email" class="form-control" id="adresse"  th:field="*{adresse}"/>
                    </div>
                    <div class="mb-3">
                        <label for="login" class="form-label">Login</label>
                        <input type="text" class="form-control" id="login"  th:field="*{login}"/>
                    </div>

                </div>
            </div>
            <div class="text-center w-100">
                <button type="submit" class="btn btn-primary w-25">Modifier</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
