<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="utf-8">
  <title>Creer Compte</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <meta content="" name="keywords">
  <meta content="" name="description">

  <!-- Favicon -->
  <link href="img/favicon.ico" rel="icon">

  <!-- Google Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icon Font Stylesheet -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Libraries Stylesheet -->
  <link href="/cssAdmin/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">
  <link href="/cssAdmin/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css" rel="stylesheet" />

  <!-- Customized Bootstrap Stylesheet -->
  <link href="/cssAdmin/css/bootstrap.min.css" rel="stylesheet">

  <!-- Template Stylesheet -->
  <link href="/cssAdmin/css/style.css" rel="stylesheet">
</head>

<body>
<div class="container-xxl position-relative bg-white d-flex p-0">
  <!-- Spinner Start -->
  <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
      <span class="sr-only">Loading...</span>
    </div>
  </div>
  <!-- Spinner End -->


  <!-- Sign Up Start -->
  <div class="container-fluid">
    <div class="row h-100 align-items-center justify-content-center w-100" style="min-height: 100vh;">
      <div class="col-12 col-sm-8 col-md-6 col-lg-5 col-xl-4 w-100 d-flex justify-content-center">
        <div class="bg-light rounded p-4 p-sm-5 my-4 mx-3 w-75">
          <div class="d-flex align-items-center justify-content-around mb-3">
            <a href="index.html" class="">
              <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>CARBOOK</h3>
            </a>
            <h3>Sign Up</h3>
          </div>
          <form class="w-100" method="post" action="#" th:object="${client} " enctype="multipart/form-data">
            <h4 th:if="${eror != null}" th:text="${eror}" class="text-danger text-center"></h4>

            <div class="d-flex justify-content-around w-100">
          <div>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="nm" th:field="*{nom}">
              <label for="nm">NOM</label>
            </div>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="pr" th:field="*{prenom}">
              <label for="pr">PRENOM</label>
            </div>
            <div class="form-floating mb-4">
              <input type="text" class="form-control" id="tele"  th:field="*{telephone}">
              <label for="tele">Telephone </label>
            </div>
            <div class="form-floating mb-4">
              <input type="text" class="form-control" id="cin"   th:field="*{cin}">
              <label for="cin">CIN</label>
            </div>
            <div class="form-floating mb-4">
              <input type="file" id="formFile" name="file" class="form-control">
              <label for="formFile">Image</label>
            </div>
          </div>
          <div>
            <div class="form-floating mb-3">
              <input type="date" class="form-control" id="da" th:field="*{date_de_naissance}">
              <label for="da">Username</label>
            </div>
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="floatingInput"th:field="*{email}">
              <label for="floatingInput">Email address</label>
            </div>
            <div class="form-floating mb-4">
              <input type="text" class="form-control" id="ad" th:field="*{adresse}">
              <label for="ad">Adresse</label>
            </div>
            <div class="form-floating mb-4">
              <input type="text" class="form-control" id="log" th:field="*{login}">
              <label for="log">Login</label>
            </div>
            <div class="form-floating mb-4">
              <input type="password" class="form-control" id="floatingPassword" th:field="*{password}">
              <label for="floatingPassword">Password</label>
            </div>
          </div>
            </div>
            <div class="text-center w-100">
              <button type="submit" class="btn btn-primary py-3  w-25 mb-4 ">Sign Up</button>

            </div>

          </form>
          <p class="text-center mb-0">Already have an Account? <a href="/Login_Clint">Sign In</a></p>
        </div>
      </div>
    </div>
  </div>
  <!-- Sign Up End -->
</div>

<!-- JavaScript Libraries -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/cssAdmin/lib/chart/chart.min.js"></script>
<script src="/cssAdmin/lib/easing/easing.min.js"></script>
<script src="/cssAdmin/lib/waypoints/waypoints.min.js"></script>
<script src="/cssAdmin/lib/owlcarousel/owl.carousel.min.js"></script>
<script src="/cssAdmin/lib/tempusdominus/js/moment.min.js"></script>
<script src="/cssAdmin/lib/tempusdominus/js/moment-timezone.min.js"></script>
<script src="/cssAdmin/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js"></script>

<!-- Template Javascript -->
<script src="/cssAdmin/js/main.js"></script>
</body>

</html>
