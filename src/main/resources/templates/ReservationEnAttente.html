<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layoutadmin.html">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

</head>
<body>
<div layout:fragment="content">
  <h4 class="text-center text-danger" th:text="${aucunReservations}"></h4>
<div class="container">
  <h3 class="text-center text-primary">reservations en attente</h3>
  <table class="table table-hover">
    <thead>
    <tr>
      <th>#</th>
      <th> client</th>
      <th> voiture</th>
      <th>date de debut</th>
      <th>date de fin</th>
      <th>date de reservation</th>
      <th>status</th>
      <th>action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r:${reservations}" >
      <td th:text="${r.id}"></td>
      <td th:text="${r.client.nom}"></td>
      <td th:text="${r.voiture.nom}"></td>
      <td th:text="${r.date_de_debut}"></td>
      <td th:text="${r.date_de_fin}"></td>
      <td th:text="${r.date_de_reservation}"></td>
      <td th:text="${r.status}"></td>
      <td >  <a class="btn btn-success" th:href="@{/accepter_Reservation/{id}('id'=${r.id})}" >accepter </a>
        <a class="btn btn-danger" th:href="@{/refuser_Reservation/{id}('id'=${r.id})}">refuser </a>
      </td>
    </tr>

    </tbody>
  </table>
</div>
  <div id="input" style="display: none">
    <input type="text" id="content">
  </div>
</div>
</body>
</html>
